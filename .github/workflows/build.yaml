name: Build & Publish
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y gcc make libudev-dev
          sudo apt install -y gcc-multilib g++-multilib  # 🔥 关键：x86 32位 支持
          sudo apt install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
          sudo apt install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          sudo apt install -y libc6-dev-i386 lib32gcc-12-dev  # 🔥 关键：32位标准库

      - name: Build Windows
        run: |
          chmod +x build-for-windows.sh
          ./build-for-windows.sh

      - name: Build Linux
        run: |
          chmod +x build-for-linux.sh
          ./build-for-linux.sh

      - name: Show files
        run: ls -lhR build/

      - name: Zip build folder
        run: zip -r build-all.zip build/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          files: build-all.zip
          overwrite: true
