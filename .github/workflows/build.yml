name: SNANDer-CH347 全平台编译
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# 给 GITHUB_TOKEN 开启写权限（解决 403 错误）
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential mingw-w64 wget tar bzip2 zip
          sudo apt install -y gcc-arm-linux-gnueabihf gcc-aarch64-linux-gnu
          chmod +x build-for-*.sh

      - name: 编译 Windows
        run: ./build-for-windows.sh

      - name: 编译 Linux
        run: ./build-for-linux.sh

      - name: 打包所有文件
        run: |
          mkdir -p release
          cp build/x86/*.exe release/
          cp build/x64/* release/
          cd release
          zip -m SNANDer-Windows-x86.zip snander-win32.exe
          zip -m SNANDer-Windows-x64.zip snander-win64.exe
          zip -m SNANDer-Linux-x64.zip snander-linux-amd64
          zip -m SNANDer-Linux-armv7.zip snander-linux-armv7
          zip -m SNANDer-Linux-arm64.zip snander-linux-arm64

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: SNANDer-All
          path: release/*.zip

  # 自动发布 Release
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: SNANDer-All
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: SNANDer-CH347 自动编译版
          files: "*.zip"
