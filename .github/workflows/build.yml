name: SNANDer-CH347 全平台编译
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential mingw-w64 wget tar bzip2 zip
          sudo apt install -y gcc-arm-linux-gnueabihf gcc-aarch64-linux-gnu
          chmod +x build-for-*.sh

      - name: Build Windows
        run: ./build-for-windows.sh

      - name: Build Linux
        run: ./build-for-linux.sh

      - name: Show all files
        run: find build -type f

      - name: Pack all files
        run: |
          mkdir -p release
          # Windows
          cp build/x86/*.exe release/
          cp build/x64/*.exe release/
          # Linux
          cp build/x64/snander-linux-* release/
          # Zip
          cd release
          for f in *; do zip "${f}.zip" "$f"; done

      - name: Upload
        uses: upload-artifact@v4
        with:
          name: SNANDer-All
          path: release/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: download-artifact@v4
        with:
          name: SNANDer-All
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: SNANDer-CH347 自动编译
          files: "*.zip"
