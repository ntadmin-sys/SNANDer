name: SNANDer-CH347 全平台编译 (Ubuntu Only)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - win-x64
          - win-x86
          - linux-x64
          - linux-armv7
          - linux-arm64

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: 安装编译环境
        run: |
          sudo apt update
          sudo apt install -y make gcc zip libusb-1.0-0-dev
          sudo apt install -y gcc-multilib
          sudo apt install -y mingw-w64
          sudo apt install -y gcc-arm-linux-gnueabihf gcc-aarch64-linux-gnu

      - name: 开始编译
        run: |
          TARGET=${{ matrix.target }}
          export CC=""
          export BIN=""
          export CFLAGS=""

          case $TARGET in
            win-x64)
              CC=x86_64-w64-mingw32-gcc
              BIN=SNANDer-Win-x64.exe
              ;;
            win-x86)
              CC=i686-w64-mingw32-gcc
              BIN=SNANDer-Win-x86.exe
              ;;
            linux-x64)
              CC=gcc
              BIN=snander-linux-x64
              ;;
            linux-armv7)
              CC=arm-linux-gnueabihf-gcc
              CFLAGS="-march=armv7-a -mfloat-abi=hard"
              BIN=snander-linux-armv7
              ;;
            linux-arm64)
              CC=aarch64-linux-gnu-gcc
              BIN=snander-linux-arm64
              ;;
          esac

          make clean
          make CC="$CC" CFLAGS="$CFLAGS" LDFLAGS="-lusb-1.0"
          mv snander "$BIN"
          zip "$BIN.zip" "$BIN"

      - name: 上传文件
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: "*.zip"

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/gh-release@v1
        with:
          tag_name: build-${{ github.run_number }}
          name: SNANDer-CH347 自动编译版本
          files: "*/**.zip"
