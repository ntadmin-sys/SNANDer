name: SNANDer-CH347 Full Build (Ubuntu Only)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt install -y build-essential wget tar bzip2 zip
          # Windows 交叉编译工具
          sudo apt install -y mingw-w64
          # Linux ARM 交叉编译工具
          sudo apt install -y gcc-arm-linux-gnueabihf gcc-aarch64-linux-gnu
          # 给所有构建脚本添加执行权限
          chmod +x build-for-*.sh

      - name: Build Windows binaries
        run: ./build-for-windows.sh

      - name: Build Linux binaries
        run: ./build-for-linux.sh

      - name: Build Darwin binaries (macOS, 若脚本依赖 osxcross 可忽略)
        run: |
          # 如果 build-for-darwin.sh 需要 osxcross 工具链，这里会失败，可以注释掉这一步
          ./build-for-darwin.sh || echo "macOS build skipped (needs osxcross)"

      - name: Collect and zip all artifacts
        run: |
          mkdir -p out
          # 假设脚本输出到 build/ 目录，按实际情况修改路径
          find build -name "*.exe" -o -name "snander" | while read f; do
            zip -j "out/$(basename $f).zip" "$f"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SNANDer-All-Binaries
          path: out/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: SNANDer-All-Binaries
          path: ./out

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: SNANDer-CH347 Full Build #${{ github.run_number }}
          body: |
            自动构建，支持平台：
            - Windows (x86/x64)
            - Linux (x86/x64/ARMv7/ARM64)
            - macOS (若构建成功)
          files: ./out/*.zip
