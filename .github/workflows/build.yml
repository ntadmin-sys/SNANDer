name: SNANDer Ubuntu Only Build (ARMv7 + 32bit All)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          # Windows
          - win-x64
          - win-x86
          - win-arm64
          # Linux
          - linux-x64
          - linux-x86
          - linux-arm64
          - linux-armv7

    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain & deps
        run: |
          sudo apt update -y
          sudo apt install -y make zip
          # 原生编译 + 32位支持
          sudo apt install -y gcc gcc-multilib libusb-1.0-0-dev
          # Windows 交叉编译
          sudo apt install -y mingw-w64
          # ARM64 + ARMv7 交叉工具链
          sudo apt install -y gcc-aarch64-linux-gnu
          sudo apt install -y gcc-arm-linux-gnueabihf

      - name: Build each target
        run: |
          set -e
          TARGET=${{ matrix.target }}
          CC=""
          CFLAGS=""
          BIN=""

          case $TARGET in
            win-x64)
              CC=x86_64-w64-mingw32-gcc
              BIN=SNANDer-Win-x64.exe
              ;;
            win-x86)
              CC=i686-w64-mingw32-gcc
              BIN=SNANDer-Win-x86.exe
              ;;
            win-arm64)
              CC=aarch64-w64-mingw32-gcc
              BIN=SNANDer-Win-arm64.exe
              ;;

            linux-x64)
              CC=gcc
              BIN=snander-linux-x64
              ;;
            linux-x86)
              CC=gcc
              CFLAGS="-m32"
              BIN=snander-linux-x86
              ;;
            linux-arm64)
              CC=aarch64-linux-gnu-gcc
              BIN=snander-linux-arm64
              ;;
            # 重点：ARMv7 硬浮点标准交叉编译
            linux-armv7)
              CC=arm-linux-gnueabihf-gcc
              CFLAGS="-march=armv7-a -mfloat-abi=hard -mfpu=vfpv3-d16"
              BIN=snander-linux-armv7
              ;;
          esac

          make clean
          make CC=$CC CFLAGS="$CFLAGS" LDFLAGS="-lusb-1.0"
          mv snander $BIN

      - name: Zip artifact
        run: |
          BINFILE=$(ls | grep -E 'snander|SNANDer.*\.exe')
          zip ${BINFILE}.zip ${BINFILE}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: *.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: SNANDer-CH347 Full Build
          body: |
            编译环境：Ubuntu Latest
            包含：Win x64/x86/ARM64 | Linux x64/x86/ARM64/ARMv7
          files: |
            *.zip
