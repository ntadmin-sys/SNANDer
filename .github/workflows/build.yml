name: Build & Publish (ch347 branch)
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 关键：强制拉取 ch347 分支代码
      - name: Checkout code (ch347 branch)
        uses: actions/checkout@v4
        with:
          ref: ch347  # 这里指定分支
          fetch-depth: 0

      # 缓存依赖，加速构建
      - name: Cache apt dependencies
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-build-deps

      # 安装编译依赖
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y mingw-w64
          sudo apt install -y linux-libc-dev
          sudo apt install -y gcc make libudev-dev
          sudo apt install -y make wget gcc g++
          sudo apt install -y gcc-multilib g++-multilib libc6-dev-i386
          sudo apt install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
          sudo apt install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          sudo apt install -y libc6-dev-i386 lib32gcc-12-dev

      # 构建 Windows
      - name: Build for Windows
        run: |
          chmod +x build-for-windows.sh
          ./build-for-windows.sh

      # 构建 Linux
      - name: Build for Linux
        run: |
          chmod +x build-for-linux.sh
          ./build-for-linux.sh

      # 查看编译结果
      - name: List built files
        run: ls -lhR build/

      # 打包
      - name: Zip build output
        run: zip -r build-all.zip build/

      # 发布 Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: build-ch347-${{ github.run_number }}
          name: Build ch347 #${{ github.run_number }}
          files: build-all.zip
          overwrite: true
          draft: false
          prerelease: false
