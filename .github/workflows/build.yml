name: Build Application All Platform
on:
  workflow_dispatch:  # 仅手动触发

permissions:
  contents: write

jobs:
  build:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          sudo apt update
          sudo apt install -y mingw-w64 make wget tar bzip2 gcc-arm-linux-gnueabihf gcc-aarch64-linux-gnu

      - name: Build Windows
        run: |
          chmod +x build-for-windows.sh
          ./build-for-windows.sh

      - name: Build Linux
        run: |
          chmod +x build-for-linux.sh
          ./build-for-linux.sh

      # 打印所有编译文件（你要的状态输出）
      - name: Show All Build Files
        run: ls -lhR build/

      # 复制全部文件
      - name: Prepare All Files
        run: |
          mkdir -p release
          cp build/x86/snander.exe            release/SNANDer-Windows-32bit.exe
          cp build/x64/snander.exe            release/SNANDer-Windows-64bit.exe
          cp build/linux-x64/snander          release/SNANDer-Linux-x64
          cp build/linux-armv7/snander        release/SNANDer-Linux-armv7
          cp build/linux-arm64/snander        release/SNANDer-Linux-arm64

      # 打印最终文件
      - name: Show Final Release Files
        run: ls -lh release/

      # 一次性发布所有文件（不会被取消！）
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: SNANDer-CH347 自动编译版
          files: release/*
          overwrite: true
